<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Biscuit Advanced Example</title>
    <script type="module">
        import { createBiscuit } from "../../src/biscuit.js";

        // A configured instance (rather than the default singleton) so we
        // can demonstrate the resilience options: retries, a fetch timeout,
        // and an onError hook a real app would pipe into telemetry.
        const cache = createBiscuit({
            maxRetries: 1,
            fetchTimeout: 8000,
            onError: (error, context) => console.warn("[biscuit]", context, error)
        });

        // --- 1. Subscribe to changes ---
        const unsubscribe = cache.subscribe(state => {
            console.log("Biscuit state changed:", state);
            document.getElementById("cache").textContent = JSON.stringify(state, null, 2);
        });

        // --- 2. Set a value with TTL + background-refresh fetcher ---
        await cache.set(
            "profile",
            { name: "Martins", age: 25 },
            10000, // TTL 10 seconds
            async () => {
                console.log("Fetching fresh profile from API...");
                return { name: "Martins", age: Math.floor(Math.random() * 50) };
            }
        );

        // --- 3. Get the value ---
        const profile = await cache.get("profile");
        console.log("Initial get:", profile);

        // --- 4. Mutate the object ---
        await cache.mutate("profile", current => ({
            ...current,
            age: current.age + 1
        }));

        // --- 5. Extend TTL on read ---
        const extendedProfile = await cache.get("profile", { extend: true });
        console.log("Extended TTL profile:", extendedProfile);

        // --- 6. Force a refetch without waiting for expiry ---
        setTimeout(async () => {
            console.log("Invalidating 'profile'...");
            await cache.invalidate("profile");
        }, 4000);

        // --- 7. Set another key with an on-demand fetcher (lazy — only
        //     fetches if read after expiry — and get() never blocks even
        //     then). Its 20s TTL is longer than this demo runs, so try
        //     `await cache.get("settings")` in the console after it, or
        //     `await cache.invalidate("settings")` to see it fire sooner. ---
        await cache.set(
            "settings",
            { theme: "dark", notifications: true },
            20000,
            async () => {
                console.log("Refreshing settings (on-demand)...");
                return { theme: "dark", notifications: true };
            },
            { refreshPolicy: "on-demand" }
        );

        // --- 8. Batch-read multiple keys at once ---
        setTimeout(async () => {
            console.log("Batch read:", await cache.getMany(["profile", "settings"]));
        }, 6000);

        // --- 9. Remove a key ---
        setTimeout(async () => {
            console.log("Removing 'profile' key...");
            await cache.remove("profile");
        }, 8000);

        // --- 10. Clear all cache ---
        setTimeout(async () => {
            console.log("Clearing entire Biscuit cache...");
            await cache.clear();
        }, 10000);

        // --- 11. Unsubscribe ---
        setTimeout(() => {
            console.log("Unsubscribing from Biscuit changes...");
            unsubscribe();
        }, 12000);
    </script>
</head>

<body>
    <h1>Advanced Biscuit Example</h1>
    <pre id="cache">Cache will appear here...</pre>
    <p>Open console to see all Biscuit operations in action.</p>
</body>

</html>
