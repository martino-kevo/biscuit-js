name: Publish to npm

on:
  workflow_dispatch: # This adds a manual "Run" button on the GitHub website

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Mandatory for secure OIDC 2FA bypass
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npmjs.org"

      - name: Install dependencies and build
        run: |
          npm install
          # If you have a build step (like npm run build), add it right here!

      - name: Publish Package
        run: npm publish --provenance
