name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # 🔑 This gives the automatic GITHUB_TOKEN the power to handshake with npm
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://npmjs.org" # Sets up the OIDC bridge structure safely

      - name: Install dependencies
        # Force npm to run anonymously so public dependencies don't get blocked
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ""

      - name: Publish Package
        # Use the special OIDC token variable that GitHub automatically populates
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
