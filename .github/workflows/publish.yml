name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Mandatory for the clean OIDC cloud handshake
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          # ❌ NO registry-url config here to protect npm ci from global auth issues

      - name: Install dependencies
        run: npm ci # This installs csstype cleanly and anonymously with zero auth

      - name: Publish Package
        # 🔑 Inject OIDC configuration manually dynamically for the publish step only
        run: |
          npm config set //registry.npmjs.org/:_authToken=$ACTIONS_ID_TOKEN_REQUEST_TOKEN
          npm publish --provenance
