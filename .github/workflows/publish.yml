name: Publish to npm

on:
  workflow_dispatch: # Allows manual trigger from the GitHub website

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          # ❌ REMOVED registry-url line to stop it from forcing auth on public package installs

      - name: Install dependencies
        run: npm ci

      - name: Publish Package
        # 🔑 Inject the token cleanly only for the publish step
        run: npm publish --_auth=${{ secrets.NPM_TOKEN }} --registry=https://registry.npmjs.org/
