name: Publish to npm

on:
  workflow_dispatch: # Allows you to click "Run" on GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Crucial: Allows GitHub to prove its identity to npm securely
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Publish Package
        run: npm publish --provenance
