name: Publish to npm

on:
  workflow_dispatch: # Allows manual trigger from the GitHub website

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for secure OIDC trusted publishing
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5 # Upgraded to v5 (Node 24 compliant)

      - name: Setup Node.js
        uses: actions/setup-node@v5 # Upgraded to v5 (Node 24 compliant)
        with:
          node-version: "24" # Sets the execution runtime environment to Node 24
          registry-url: "https://npmjs.org"

      - name: Install dependencies
        run: npm ci # Performs a clean, deterministic package installation

      - name: Publish Package
        run: npm publish --provenance
