name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Trusted Publishing handshake
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          # ❌ Removed registry-url here so 'npm ci' doesn't get corrupted by auth rules

      - name: Install dependencies
        run: npm ci # This will now safely download csstype anonymously

      - name: Publish Package
        # 🚀 Pass the registry and provenance flags directly to the publish execution step
        run: npm publish --registry=https://npmjs.org --provenance
